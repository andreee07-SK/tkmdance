<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Tanečný klub M-DANCE – Pripravujeme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.45);
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        h2 {
            font-weight: 300;
            margin-bottom: 25px;
        }

        .dance {
            font-size: 3rem;
            margin: 20px 0;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .highlight {
            font-weight: 600;
            color: #ffd700;
        }

        .footer {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="dance">💃🕺</div>
        <h1>Tanečný klub <span class="highlight">M‑DANCE</span></h1>
        <h2>Na tejto stránke sa práve pracuje</h2>

        <p>
            Pripravujeme pre vás <strong>nový moderný web</strong>,  
            kde nájdete informácie o tréningoch, súťažiach, lektoroch  
            a všetkom, čo patrí k svetu tanca.
        </p>

        <p class="highlight">
            Stránka bude už čoskoro k dispozícii!
        </p>

        <div class="footer">
            Ďakujeme za vašu trpezlivosť 💛
        </div>
    </div>

</body>
</html>
